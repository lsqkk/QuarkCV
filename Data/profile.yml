about:
  lead: I am Clara Vale, a Ph.D. candidate in Computer Science at the Redwood Institute of Technology, where I study reliable machine learning systems for scientific and medical imaging.
  summary: My research sits at the intersection of trustworthy AI, multimodal representation learning, and human-centered research tooling. I enjoy building reproducible systems that connect methodological rigor with practical deployment in real-world scientific workflows.
  resume_summary: Clara Vale is a Ph.D. candidate in Computer Science at the Redwood Institute of Technology working on trustworthy machine learning, scientific imaging, and human-centered AI systems, with experience spanning research, open-source tooling, and interdisciplinary collaboration.
  resume_focus:
    - Trustworthy machine learning
    - Scientific imaging
    - Multimodal representation learning
    - Research software engineering
    - Human-centered AI
  focus_areas:
    - Trustworthy machine learning
    - Scientific imaging
    - Multimodal learning
    - Research software engineering
    - Human-centered AI

